<style>
:root{--bg:#f4f2ee;--sur:#fff;--txt:#1a1a1a;--mu:#888;--ac:#1a3a5c;--bo:#e0dcd5;--ch:#eceae5;--ra:14px;--sh:0 2px 10px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.hdr{background:var(--ac);color:#fff;padding:18px 16px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.22)}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr h1{font-family:'Playfair Display',serif;font-size:20px}
.bdg{background:rgba(255,255,255,.18);font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px}
.sw{position:relative}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5;pointer-events:none}
#search{width:100%;padding:10px 36px;border-radius:10px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
#search::placeholder{color:rgba(255,255,255,.5)}
#search:focus{background:rgba(255,255,255,.22)}
#cb{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}
#cb.s{display:flex}
.fil{padding:10px 14px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--bo);position:sticky;top:104px;z-index:90;-webkit-overflow-scrolling:touch}
.fil::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid transparent;cursor:pointer;background:var(--ch);color:#555;white-space:nowrap;user-select:none;-webkit-tap-highlight-color:transparent}
.chip.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.ri{padding:9px 16px 4px;font-size:12px;color:var(--mu)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:10px 13px 40px}
.card{background:var(--sur);border-radius:var(--ra);overflow:hidden;box-shadow:var(--sh);cursor:pointer;-webkit-tap-highlight-color:transparent;animation:fu .2s ease both}
.card:active{opacity:.8}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ciw{width:100%;aspect-ratio:1/1;background:#f0ede8;overflow:hidden}
.ci{width:100%;height:100%;object-fit:cover;display:block;background:#e8e5e0;opacity:0;transition:opacity .3s ease}.ci:not([data-src]){opacity:1}
.cbo{padding:8px 10px 10px;border-top:1px solid var(--bo)}
.cc{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.cs{font-size:13px;font-weight:600;line-height:1.25}
.cm{font-size:10.5px;color:#e67e22;margin-top:4px;font-weight:500;line-height:1.3}
mark{background:#fff3cd;color:#c0392b;font-weight:700;border-radius:2px}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:none;flex-direction:column}
#lb.open{display:flex}
.lbh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;color:#fff;flex-shrink:0}
.lbs{font-family:'Playfair Display',serif;font-size:18px;color:#fff}
.lbc{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;opacity:.6;color:#fff}
.lbx{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}.lbbtns{display:flex;gap:8px;align-items:center}.lbshr{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}.lbshr:active{background:rgba(255,255,255,.25)}
.lbshr:disabled{opacity:0.6;cursor:default}
.lbspin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lbic{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:none}
#lbi{max-width:100%;max-height:100%;object-fit:contain;display:block;transform-origin:center center;user-select:none;-webkit-user-drag:none;pointer-events:none}
.lbhint{text-align:center;color:rgba(255,255,255,.3);font-size:12px;padding:10px;flex-shrink:0}
.lbnav{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lbnarr{background:none;border:none;color:rgba(255,255,255,.8);font-size:48px;padding:0 16px;cursor:pointer;line-height:1;transition:opacity .2s;-webkit-tap-highlight-color:transparent}
.lbnarr:active{color:#fff}
#lbi{transition:opacity .15s ease}
.empty{text-align:center;padding:60px 20px;color:var(--mu);grid-column:1/-1}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty h3{font-size:16px;margin-bottom:6px;color:#555}
</style>
</head>

// Lazy load observer - loads images only when they enter viewport
function initLazyLoad(){
  const observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        const img = entry.target;
        const src = img.getAttribute('data-src');
        if(src){
          img.src = src;
          img.removeAttribute('data-src');
          observer.unobserve(img);
        }
      }
    });
  },{rootMargin:'200px 0px', threshold:0.01});
  document.querySelectorAll('img[data-src]').forEach(function(img){
    observer.observe(img);
  });
}

function initLazyLoad(){
  if(window._lazyObserver) window._lazyObserver.disconnect();
  window._lazyObserver = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        var img = entry.target;
        var src = img.getAttribute('data-src');
        if(src){
          img.src = src;
          img.removeAttribute('data-src');
          img.style.opacity = '1';
          window._lazyObserver.unobserve(img);
        }
      }
    });
  },{rootMargin:'400px 0px',threshold:0});
  document.querySelectorAll('img[data-src]').forEach(function(img){
    window._lazyObserver.observe(img);
  });
}

function shareImg(){
  const idx = lbCurIdx;
  const p = M[idx];
  const imgUrl = 'https://adl-catalogue.pages.dev/' + I[idx];
  const btn = document.querySelector('.lbshr');

  // Show loading spinner
  btn.innerHTML = '<span class="lbspin"></span>';
  btn.disabled = true;

  // Try to share as actual file first
  fetch(imgUrl)
    .then(r => r.blob())
    .then(blob => {
      const fname = p.sku + '.jpg';
      const file = new File([blob], fname, {type: blob.type || 'image/jpeg'});
      try {
        return navigator.share({
          files: [file],
          title: p.sku,
          text: p.sku + ' - ADL Product Catalogue'
        });
      } catch(e){
        // File share failed, try URL share
        if(navigator.share){
          return navigator.share({
            title: p.sku,
            text: p.sku + ' - ADL Product Catalogue',
            url: imgUrl
          });
        } else {
          return navigator.clipboard.writeText(imgUrl);
        }
      }
    })
    .catch(()=>{})
    .finally(()=>{
      btn.innerHTML = '&#x2191;';
      btn.disabled = false;
    });
}
